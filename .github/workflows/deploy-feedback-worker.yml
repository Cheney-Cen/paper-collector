name: Deploy feedback worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-feedback-worker.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_GITHUB_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
      CF_ACCESS_AUD: ${{ secrets.CF_ACCESS_AUD }}
      CF_ACCESS_TEAM_DOMAIN: ${{ vars.CF_ACCESS_TEAM_DOMAIN }}
      FEEDBACK_ALLOWED_ORIGIN: ${{ vars.FEEDBACK_ALLOWED_ORIGIN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy Worker code and non-secret configuration
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CF_ACCESS_AUD != '' && env.CF_ACCESS_TEAM_DOMAIN != '' && env.FEEDBACK_ALLOWED_ORIGIN != '' }}
        run: |
          npx --yes wrangler@4 deploy --config worker/wrangler.toml \
            --var "GITHUB_REPOSITORY:$GITHUB_REPOSITORY" \
            --var "CF_ACCESS_AUD:$CF_ACCESS_AUD" \
            --var "CF_ACCESS_TEAM_DOMAIN:$CF_ACCESS_TEAM_DOMAIN" \
            --var "FEEDBACK_ALLOWED_ORIGIN:$FEEDBACK_ALLOWED_ORIGIN"
      - name: Store private GitHub token in Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.WORKER_GITHUB_TOKEN != '' && env.CF_ACCESS_AUD != '' && env.CF_ACCESS_TEAM_DOMAIN != '' && env.FEEDBACK_ALLOWED_ORIGIN != '' }}
        run: printf '%s' "$WORKER_GITHUB_TOKEN" | npx --yes wrangler@4 secret put GITHUB_TOKEN --config worker/wrangler.toml
